# Browser Configuration
browser=chrome
headless=false

# Timeout Configuration (in seconds)
implicit.wait=10
explicit.wait=15
fluent.wait=30
page.load.timeout=30

# Application URLs
base.url=https://www.saucedemo.com

# Screenshot Configuration
screenshot.on.failure=true
screenshot.path=screenshots/

# Retry Configuration
retry.count=1

# Directory where raw JSON results are saved during test run
allure.results.directory=allure-results

# Clean results directory before each run
allure.link.issue.pattern=https://jira.yourcompany.com/browse/{}
allure.link.tms.pattern=https://jira.yourcompany.com/browse/{}