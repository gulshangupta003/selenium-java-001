name: Regression Tests

run-name: ${{ inputs.run_title || 'Regression' }} [${{ inputs.env || 'qa' }} | ${{ inputs.browser || 'chrome' }} | ${{ inputs.os || 'ubuntu latest' }}] by @${{ github.actor }}

on:
  schedule:
    - cron: '0 2 * * *'

  workflow_dispatch:
    inputs:
      browser:
        description: 'Browser'
        required: true
        default: 'chrome'
        type: choice
        options:
          - chrome
          - firefox
          - edge
      env:
        description: 'ENV'
        required: true
        default: 'qa'
        type: choice
        options:
          - qa
          - dev
          - prod
      suite:
        description: 'Test Suite'
        required: true
        default: 'testng-regression.xml'
        type: choice
        options:
          - testng-regression.xml
          - testng.xml
          - testng-crossbrowser.xml
      os:
        description: 'OS'
        required: true
        default: 'ubuntu-latest'
        type: choice
        options:
          - ubuntu-latest
          - windows-latest
          - macos-latest
      run_title:
        description: 'Custom Run Name (Optional)'
        required: false
        default: 'Manual Run'
        type: string

permissions:
  contents: write

jobs:
  regression-tests:
    name: Regression — ${{ inputs.browser || 'chrome' }} / ${{ inputs.env || 'qa' }}
    runs-on: ${{ inputs.os || 'ubuntu-latest' }}
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      #      - name: Set Up Chrome
      #        if: ${{ github.event.inputs.browser == 'chrome' || github.event.inputs.browser == '' }}
      #        uses: browser-actions/setup-chrome@v1
      #        with:
      #          chrome-version: 'stable'
      #
      #      - name: Set up Firefox
      #        if: ${{ github.event.inputs.browser == 'firefox' }}
      #        uses: browser-actions/setup-firefox@v1
      #        with:
      #          firefox-version: 'latest'
      #
      #      - name: Set up Edge
      #        if: ${{ github.event.inputs.browser == 'edge' }}
      #        uses: browser-actions/setup-edge@v1
      #        with:
      #          edge-version: 'stable'

      - name: Run Regression Tests
        shell: bash
        env:
          SUITE: ${{ inputs.suite || 'testng-regression.xml' }}
          BROWSER: ${{ inputs.browser || 'chrome' }}
          ENV: ${{ inputs.env || 'qa' }}
          OS: $${{ inputs.os || 'ubuntu-latest' }}
        run: |
          echo "═══════════════════════════════════════"
          echo "Suite: $SUITE"
          echo "Browser: $BROWSER"
          echo "ENV: $ENV"
          echo "OS: $OS"
          echo "═══════════════════════════════════════"
          
          mvn clean test \
            -Dsurefire.suiteXmlFiles=src/test/resources/$SUITE \
            -Dbrowser=$BROWSER \
            -Dheadless=true \
            -Denv=$ENV
        continue-on-error: true

      - name: Store Allure Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/
          retention-days: 30

      - name: Store Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs
          path: logs/
          retention-days: 30

      - name: Generate and deploy allure reports
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Build allure reports
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: allure-results
          allure_history: allure-history
          gh_pages: gh-pages
          keep_reports: 20

      - name: Publish allure reports to Github Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
          emptyCommits: true