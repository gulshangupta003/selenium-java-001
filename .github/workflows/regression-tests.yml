name: Regression Tests

on:
  schedule:
    - cron: '0 2 * * *'

  workflow_dispatch:
    inputs:
      browser:
        description: 'Browser'
        required: true
        default: 'chrome'
        type: choice
        options:
          - chrome
          - firefox
          - edge
      env:
        description: 'ENV'
        required: true
        default: 'qa'
        type: choice
        options:
          - qa
          - dev
          - prod
      suite:
        description: 'Test Suite'
        required: true
        default: 'testng-regression.xml'
        type: choice
        options:
          - testng-regression.xml
          - testng.xml
          - testng-crossbrowser.xml

jobs:
  regression-tests:
    name: Regression — ${{ github.event.inputs.browser || 'chrome' }} / ${{ github.event.inputs.environment || 'qa' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          version: '21'
          cache: 'maven'

      - name: Set Up Chrome
        if: ${{ github.event.inputs.browser == 'chrome' || github.event.inputs.browser == '' }}
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: 'stable'

      - name: Set up Firefox
        if: ${{ github.event.inputs.browser == 'firefox' }}
        uses: browser-actions/setup-firefox@v1
        with:
          firefox-version: 'latest'

      - name: Set up Edge
        if: ${{ github.event.inputs.browser == 'edge' }}
        uses: browser-actions/setup-edge@v1
        with:
          edge-version: 'stable'

      - name: Run Regression Tests
        run: |
          SUITE="${{ github.event.inputs.suite || 'testng-regression.xml' }}"
          BROWSER="${{ github.event.inputs.browser || 'chrome' }}"
          ENV="${{ github.event.inputs.environment || 'qa' }}"
          
          echo "═══════════════════════════════════════"
          echo "Suite: $SUITE"
          echo "Browser: $BROWSER"
          echo "Environment: $ENV"
          echo "═══════════════════════════════════════"
          
          mvn clean test \
            -Dsurefire.suiteXmlFiles=src/test/resources/$SUITE \
            -Dbrowser=$BROWSER \
            -Dheadless=true \
            -Denvironment=$ENV

      - name: Store Allure Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/
          retention-days: 30

      - name: Store Failure Screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: screenshots/
          retention-days: 30

      - name: Store Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs
          path: logs/
          retention-days: 30